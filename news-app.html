<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --cream: #ede8de;
    --accent: #c8392b;
    --muted: #7a7570;
    --rule: #d4cfc6;
    --tag-bg: #0f0e0c;
    --tag-fg: #f5f0e8;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- MASTHEAD ---- */
  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 0 2rem;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .masthead-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 1rem 0 0.5rem;
    border-bottom: 1px solid var(--rule);
    gap: 1rem;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }

  .logo span {
    color: var(--accent);
  }

  .dateline {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.5;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .masthead-tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    padding: 0.35rem 0;
    letter-spacing: 0.03em;
  }

  /* ---- FILTERS ---- */
  .filters {
    display: flex;
    gap: 0.5rem;
    padding: 0.6rem 0;
    overflow-x: auto;
    scrollbar-width: none;
    align-items: center;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
    border-radius: 0;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* ---- MAIN LAYOUT ---- */
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ---- HERO CARD ---- */
  .hero-card {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--ink);
    margin-bottom: 2rem;
    background: var(--ink);
    color: var(--paper);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: fadeUp 0.5s ease both;
  }

  .hero-card:hover {
    transform: translateY(-3px);
    box-shadow: 6px 6px 0 var(--accent);
  }

  .hero-image {
    background: #1a1916;
    min-height: 320px;
    position: relative;
    overflow: hidden;
  }

  .hero-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.8;
    display: block;
  }

  .hero-image .img-placeholder {
    width: 100%;
    height: 100%;
    min-height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    background: linear-gradient(135deg, #1a1916 0%, #2d2b28 100%);
  }

  .hero-content {
    padding: 2rem 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .hero-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: var(--accent);
    color: white;
    padding: 0.2rem 0.5rem;
    margin-bottom: 1rem;
    width: fit-content;
  }

  .hero-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 1rem;
    flex-grow: 1;
  }

  .hero-summary {
    font-size: 0.85rem;
    line-height: 1.65;
    color: #b8b3aa;
    margin-bottom: 1.5rem;
  }

  .hero-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: #7a7570;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-top: 1px solid #2d2b28;
    padding-top: 0.75rem;
    display: flex;
    justify-content: space-between;
  }

  /* ---- GRID ---- */
  .section-rule {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .section-rule-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
    color: var(--muted);
  }

  .section-rule-line {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }

  /* ---- NEWS CARD ---- */
  .news-card {
    background: var(--paper);
    padding: 1.25rem 1.25rem 1rem;
    cursor: pointer;
    transition: background 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .news-card:hover {
    background: var(--cream);
  }

  .news-card:hover .card-headline {
    color: var(--accent);
  }

  .card-image {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    background: var(--cream);
  }

  .card-image-placeholder {
    width: 100%;
    height: 160px;
    background: linear-gradient(135deg, var(--cream) 0%, var(--rule) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }

  .card-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 500;
  }

  .card-headline {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.35;
    transition: color 0.15s ease;
  }

  .card-summary {
    font-size: 0.8rem;
    line-height: 1.6;
    color: var(--muted);
    flex-grow: 1;
  }

  .card-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: #aaa49c;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-top: 1px solid var(--rule);
    padding-top: 0.6rem;
    display: flex;
    justify-content: space-between;
  }

  /* ---- READ MORE RIBBON ---- */
  .read-more {
    display: block;
    text-align: center;
    margin: 2.5rem auto 0;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    border: 1px solid var(--rule);
    padding: 0.75rem 2rem;
    background: transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    width: fit-content;
  }

  .read-more:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* ---- LOADING ---- */
  .loading {
    text-align: center;
    padding: 4rem 2rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 1.1rem;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 1ch;
    animation: dots 1.2s steps(3, end) infinite;
  }

  @keyframes dots {
    0%, 33% { content: '.'; }
    34%, 66% { content: '..'; }
    67%, 100% { content: '...'; }
  }

  /* ---- MODAL ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,14,12,0.85);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    backdrop-filter: blur(2px);
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--paper);
    max-width: 680px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    border: 1px solid var(--ink);
    transform: translateY(20px);
    transition: transform 0.2s ease;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-header {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
    background: var(--paper);
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 1rem;
  }

  .modal-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
  }

  .modal-close {
    background: none;
    border: 1px solid var(--rule);
    width: 2rem;
    height: 2rem;
    cursor: pointer;
    font-size: 1rem;
    color: var(--muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .modal-close:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .modal-body {
    padding: 1.5rem;
  }

  .modal-image {
    width: 100%;
    height: 240px;
    object-fit: cover;
    margin-bottom: 1.5rem;
    display: block;
  }

  .modal-image-placeholder {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, var(--cream) 0%, var(--rule) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    margin-bottom: 1.5rem;
  }

  .modal-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }

  .modal-content {
    font-size: 0.9rem;
    line-height: 1.75;
    color: #3a3733;
  }

  .modal-content p { margin-bottom: 1rem; }

  .modal-source-link {
    display: inline-block;
    margin-top: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 1px;
    transition: opacity 0.15s;
  }

  .modal-source-link:hover { opacity: 0.7; }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .news-card:nth-child(1) { animation-delay: 0.05s; }
  .news-card:nth-child(2) { animation-delay: 0.1s; }
  .news-card:nth-child(3) { animation-delay: 0.15s; }
  .news-card:nth-child(4) { animation-delay: 0.2s; }
  .news-card:nth-child(5) { animation-delay: 0.25s; }
  .news-card:nth-child(6) { animation-delay: 0.3s; }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 700px) {
    .hero-card { grid-template-columns: 1fr; }
    .hero-image { min-height: 220px; }
    .hero-image .img-placeholder { min-height: 220px; }
    .masthead { padding: 0 1rem; }
    .page { padding: 1.25rem 1rem 3rem; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-top">
    <div class="logo">The<span>.</span>Brief</div>
    <div class="dateline" id="dateline"></div>
  </div>
  <div class="masthead-tagline">Global headlines, without the noise</div>
  <div class="filters" id="filters"></div>
</header>

<main class="page">
  <div id="app-content">
    <div class="loading">Gathering the news</div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div style="flex:1">
        <div class="modal-tag" id="modal-tag"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div id="modal-image-area"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>
</div>

<script>
// ---- DATE ----
const now = new Date();
document.getElementById('dateline').innerHTML =
  now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) +
  '<br>Global Edition';

// ---- CONFIG ----
const API_KEY = '552a6cf9dd87e1c04fa4dff44fd4faa3';

// Keywords to filter out
const BLOCKED_KEYWORDS = [
  'trump', 'donald trump', 'maga', 'republican party', 'democratic party',
  'congress', 'senate', 'house of representatives', 'white house',
  'biden', 'harris', 'pelosi', 'mcconnell', 'gop',
  'us politics', 'american politics', 'midterm', 'oval office'
];

const CATEGORY_QUERIES = {
  'All': 'world',
  'World': 'international',
  'Science': 'science discovery',
  'Technology': 'technology innovation',
  'Environment': 'climate environment',
  'Health': 'health medicine',
  'Culture': 'arts culture'
};

const CATEGORY_EMOJIS = {
  'science': '🔭', 'technology': '💻', 'health': '💊',
  'environment': '🌿', 'world': '🌍', 'culture': '🎨',
  'business': '📈', 'sports': '⚽', 'general': '📰'
};

// ---- DATA ----
const categories = ['All', 'World', 'Science', 'Technology', 'Environment', 'Health', 'Culture'];
let activeCategory = 'All';
let stories = [];
let storyIdCounter = 0;

function isBlocked(text) {
  if (!text) return false;
  const lower = text.toLowerCase();
  return BLOCKED_KEYWORDS.some(kw => lower.includes(kw));
}

function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
  if (diff < 60) return `${diff}m ago`;
  if (diff < 1440) return `${Math.floor(diff/60)}h ago`;
  return `${Math.floor(diff/1440)}d ago`;
}

function guessEmoji(title, description) {
  const text = (title + ' ' + description).toLowerCase();
  if (/climate|reef|ocean|forest|carbon|emission|wildfire|flood|drought/.test(text)) return '🌿';
  if (/space|asteroid|nasa|galaxy|planet|star|orbit|rocket|comet/.test(text)) return '🚀';
  if (/virus|vaccine|cancer|health|hospital|disease|outbreak|medicine/.test(text)) return '💊';
  if (/ai|robot|tech|software|chip|cyber|digital|quantum/.test(text)) return '💻';
  if (/art|music|film|culture|museum|festival|book|theatre/.test(text)) return '🎨';
  if (/earthquake|volcano|tsunami|storm|hurricane|tornado/.test(text)) return '⚡';
  if (/atom|particle|physics|biology|chemistry|genome|dna/.test(text)) return '⚛️';
  if (/economy|trade|market|inflation|bank|finance/.test(text)) return '📈';
  return '🌍';
}

async function fetchNews(category) {
  const query = CATEGORY_QUERIES[category] || 'world';
  const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(query)}&lang=en&max=10&sortby=publishedAt&apikey=${API_KEY}`;

  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();

  if (!data.articles) throw new Error(data.errors?.[0] || 'API error');

  return data.articles
    .filter(a => a.title)
    .filter(a => !isBlocked(a.title) && !isBlocked(a.description))
    .map(a => ({
      id: ++storyIdCounter,
      category: category === 'All' ? 'World' : category,
      headline: a.title,
      summary: a.description || 'Read the full story for more details.',
      body: (a.content || a.description || '').trim(),
      source: a.source.name,
      time: timeAgo(a.publishedAt),
      emoji: guessEmoji(a.title, a.description),
      image: a.image,
      url: a.url
    }));
}

// ---- RENDER ----
function renderFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = categories.map(cat => `
    <button class="filter-btn ${cat === activeCategory ? 'active' : ''}"
      onclick="setCategory('${cat}')">${cat}</button>
  `).join('');
}

async function setCategory(cat) {
  activeCategory = cat;
  renderFilters();
  await loadAndRender();
}

function cardImageHTML(s, type) {
  if (type === 'hero') {
    return s.image
      ? `<img src="${s.image}" alt="" onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'>${s.emoji}</div>'">`
      : `<div class="img-placeholder">${s.emoji}</div>`;
  }
  return s.image
    ? `<img class="card-image" src="${s.image}" alt="" onerror="this.outerHTML='<div class=\\'card-image-placeholder\\'>${s.emoji}</div>'">`
    : `<div class="card-image-placeholder">${s.emoji}</div>`;
}

function renderStories(list) {
  const container = document.getElementById('app-content');

  if (!list || list.length === 0) {
    container.innerHTML = `<div class="loading" style="animation:none">No stories found</div>`;
    return;
  }

  const [hero, ...rest] = list;

  const heroHTML = `
    <div class="hero-card" onclick="openModal(${hero.id})">
      <div class="hero-image">${cardImageHTML(hero, 'hero')}</div>
      <div class="hero-content">
        <div>
          <div class="hero-tag">${hero.category}</div>
          <div class="hero-headline">${hero.headline}</div>
          <div class="hero-summary">${hero.summary}</div>
        </div>
        <div class="hero-meta">
          <span>${hero.source}</span>
          <span>${hero.time}</span>
        </div>
      </div>
    </div>
  `;

  const gridHTML = rest.length ? `
    <div class="section-rule">
      <span class="section-rule-label">More Stories</span>
      <div class="section-rule-line"></div>
    </div>
    <div class="cards-grid">
      ${rest.map(s => `
        <div class="news-card" onclick="openModal(${s.id})">
          ${cardImageHTML(s, 'card')}
          <div class="card-tag">${s.category}</div>
          <div class="card-headline">${s.headline}</div>
          <div class="card-summary">${s.summary}</div>
          <div class="card-meta">
            <span>${s.source}</span>
            <span>${s.time}</span>
          </div>
        </div>
      `).join('')}
    </div>
  ` : '';

  container.innerHTML = heroHTML + gridHTML;
}

async function loadAndRender() {
  const container = document.getElementById('app-content');
  container.innerHTML = `<div class="loading">Gathering the news</div>`;
  try {
    stories = await fetchNews(activeCategory);
    renderStories(stories);
  } catch (err) {
    container.innerHTML = `<div class="loading" style="animation:none">
      Could not load stories. Check your API key or network connection.<br>
      <small style="font-family:monospace;font-size:0.7rem;color:#aaa">${err.message}</small>
    </div>`;
  }
}

// ---- MODAL ----
function openModal(id) {
  const s = stories.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modal-tag').textContent = s.category;
  document.getElementById('modal-title').textContent = s.headline;
  document.getElementById('modal-meta').textContent = `${s.source}  ·  ${s.time}`;
  document.getElementById('modal-image-area').innerHTML = s.image
    ? `<img class="modal-image" src="${s.image}" alt="" onerror="this.outerHTML='<div class=\\'modal-image-placeholder\\'>${s.emoji}</div>'">`
    : `<div class="modal-image-placeholder">${s.emoji}</div>`;
  const bodyText = s.body || s.summary || '';
  document.getElementById('modal-content').innerHTML =
    bodyText.split('\n\n').map(p => `<p>${p}</p>`).join('') +
    `<a class="modal-source-link" href="${s.url}" target="_blank" rel="noopener">Read full story at ${s.source} ↗</a>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// ---- INIT ----
renderFilters();
loadAndRender();
</script>
</body>
</html>
